<html lang="zh-CN">
<head>

    <title>对公业务管理中台 | 功能全景导航</title>
    <script src="https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {

        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 24px 20px;
            color: #1a2634;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0b2b3b 0%, #123e4e 100%);
            color: white;
            padding: 24px 28px;
        }

        .header h1 {
            margin: 0 0 8px 0;
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
        }

        .header p {
            margin: 0;
            opacity: 0.8;
            font-size: 0.95rem;
        }

        .stats-badge {
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        .stats-section {
            background: #ffffff;
            padding: 20px 28px;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 28px;
            justify-content: space-between;
        }
        .stats-text {
            flex: 2;
            min-width: 200px;
        }
        .stats-text h3 {
            margin: 0 0 8px 0;
            font-weight: 600;
            color: #1f4e6e;
            font-size: 1.2rem;
        }
        .stats-text p {
            margin: 0;
            color: #5f7d95;
            font-size: 0.9rem;
        }
        .pie-chart-container {
            flex: 1;
            min-width: 220px;
            max-width: 280px;
            background: #fafcff;
            border-radius: 24px;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        canvas#levelPieChart {
            max-height: 200px;
            width: 100%;
        }
        @media (max-width: 680px) {
            .stats-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .pie-chart-container {
                align-self: center;
                width: 100%;
                max-width: 260px;
            }
        }

        .toolbar {
            padding: 16px 28px;
            background: #ffffff;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
        }

            flex: 1;
            min-width: 260px;
            background: #f8f9fc;
            border: 1px solid #e2e6ec;
            border-radius: 48px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box span {
            color: #7f8c8d;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #2c6e9e;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 30px;
            transition: 0.2s;
            background: #eef2f7;
        }

        .clear-btn:hover {
            background: #e2e8f0;
        }

        .total-count {
            font-size: 0.85rem;
            background: #eef2f9;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 500;
            white-space: nowrap;
        }

        .nav-tabs {
            background: #ffffff;
            padding: 12px 28px;
            border-bottom: 1px solid #e9edf2;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
        }

        .nav-tabs-inner {
            display: inline-flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            display: inline-block;
            background: #f0f3f8;
            color: #1e4663;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-btn:hover {
            background: #e2e9f2;
            transform: translateY(-1px);
        }

        .groups-container {
            padding: 20px 28px 32px 28px;
            background: white;
        }

        .function-group {
            margin-bottom: 48px;
            scroll-margin-top: 80px;
        }

        .group-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0f3b4c;
            border-left: 5px solid #1e88b0;
            padding-left: 18px;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

            font-size: 0.8rem;
            font-weight: normal;
            background: #eef2f9;
            padding: 2px 10px;
            border-radius: 30px;
            color: #3c6e8f;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #ecf0f3;
            background: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 800px;
        }

        .data-table th {
            background: #f8fafd;
            color: #1e3a4b;
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #edf2f7;
            vertical-align: top;
            line-height: 1.4;
        }

        .data-table tr:hover td {
            background-color: #fafcff;
        }

            display: inline-block;
            background: #e9f0f5;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #1c5a7a;
            margin: 2px 4px 2px 0;
            white-space: nowrap;
        }

        .terminal-badge.mobile {
            background: #e3f0e8;
            color: #2a6b47;
        }

        .terminal-badge.pc {
            background: #e3eaf9;
            color: #2c5282;
        }

        .func-desc {
            max-width: 480px;
            word-break: break-word;
            white-space: normal;
        }

        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #8a99aa;
            font-size: 1rem;
            background: #fefefe;
            border-radius: 28px;
        }

            padding: 16px 28px;
            border-top: 1px solid #e9edf2;
            font-size: 0.75rem;
            color: #6c7a89;
            background: #fefefe;
            text-align: center;
        }

            body {
                padding: 16px 12px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .toolbar {

            }
            .group-title {
                font-size: 1.3rem;
            }

    </style>
</head>

<div class="container">

    // 解析数据，并记录一级功能出现顺序
    function parseFunctionList(lines) {
        const result = [];
        let lastLevel1 = '', lastLevel2 = '';
        for (let line of lines) {
            if (!line.trim() || line.includes('---')) continue;
            let cells = line.split('|').map(cell => cell.trim());
            if (cells.length > 0 && cells[0] === '') cells.shift();
            if (cells.length > 0 && cells[cells.length-1] === '') cells.pop();
            if (cells.length < 5) continue;
            let level1 = cells[0] || '';
            let level2 = cells[1] || '';
            let level3 = cells[2] || '';
            let desc = cells[3] || '';
            let terminal = cells[4] || '';
            if (level1 !== '') lastLevel1 = level1;
            if (level2 !== '') lastLevel2 = level2;
            result.push({
                level1: lastLevel1,
                level2: lastLevel2,
                level3: level3,
                description: desc,
                terminal: terminal
            });
        }
        return result;
    }

    const allFunctions = parseFunctionList(rawTableLines);
    let currentFiltered = [...allFunctions];

    // 按一级功能分组，并保持原始顺序（按首次出现）
    function groupByLevel1PreserveOrder(data) {
        const groups = new Map();
        const order = [];
        for (const item of data) {
            const key = item.level1;
            if (!groups.has(key)) {
                groups.set(key, []);
                order.push(key);
            }
            groups.get(key).push(item);
        }
        // 返回按顺序排列的 [ [level1, items], ... ]
        return order.map(l1 => [l1, groups.get(l1)]);
    }

    // 获取全量分组数据（用于饼图统计）
    function getFullGroupsForPie() {
        const fullGroups = groupByLevel1PreserveOrder(allFunctions);
        return fullGroups.map(([l1, items]) => ({ level1: l1, count: items.length }));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    function formatTerminal(terminalStr) {
        if (!terminalStr) return '';
        return terminalStr.split(',').map(t => {
            const type = t.trim();
            if (type === '移动端') return `<span class="terminal-badge mobile">📱 移动端</span>`;
            if (type === 'PC') return `<span class="terminal-badge pc">🖥️ PC</span>`;
            return `<span class="terminal-badge">${escapeHtml(type)}</span>`;
        }).join('');
    }

    // 渲染导航和内容（保持原始顺序）
    function renderGroups(data) {
        const groupEntries = groupByLevel1PreserveOrder(data);
        
        document.getElementById('resultCount').innerText = `共 ${data.length} 项功能`;
        document.getElementById('liveCount').innerHTML = `📋 全量 ${allFunctions.length} 项功能 · 当前筛选 ${data.length}`;
        
        if (data.length === 0) {
            document.getElementById('navTabs').style.display = 'none';
            document.getElementById('groupsContainer').innerHTML = '<div class="empty-message">🔍 未找到匹配的功能，请调整搜索条件</div>';
            return;
        }
        
        // 构建导航栏
        const navInner = document.getElementById('navInner');
        navInner.innerHTML = '';
        for (const [level1, items] of groupEntries) {
            const id = `group-${level1.replace(/\s+/g, '-').replace(/[^\w\u4e00-\u9fa5-]/g, '')}`;
            const btn = document.createElement('div');
            btn.className = 'nav-btn';
            btn.textContent = `${level1} (${items.length})`;
            btn.onclick = () => {
                const target = document.getElementById(id);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };
            navInner.appendChild(btn);
        }
        document.getElementById('navTabs').style.display = 'block';
        
        // 构建内容区
        const container = document.getElementById('groupsContainer');
        let html = '';
        for (const [level1, items] of groupEntries) {
            const groupId = `group-${level1.replace(/\s+/g, '-').replace(/[^\w\u4e00-\u9fa5-]/g, '')}`;
            html += `<div class="function-group" id="${groupId}">`;
            html += `<div class="group-title">📁 ${escapeHtml(level1)} <small>${items.length}项功能</small></div>`;
            html += `<div class="table-wrapper">`;
            html += `<table class="data-table">`;
            html += `<thead><tr><th>二级功能</th><th>三级功能</th><th>功能说明</th><th>支持终端类型</th></tr></thead><tbody>`;
            for (const row of items) {
                html += `<tr>
                            <td>${escapeHtml(row.level2)}</td>
                            <td>${escapeHtml(row.level3)}</td>
                            <td class="func-desc">${escapeHtml(row.description)}</td>
                            <td>${formatTerminal(row.terminal)}</td>
                         </tr>`;
            }
            html += `</tbody></table></div></div>`;
        }
        container.innerHTML = html;
    }

    function filterData() {
        const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
        let filtered = allFunctions;
        if (searchVal !== '') {
            filtered = allFunctions.filter(item => {
                const haystack = `${item.level1} ${item.level2} ${item.level3} ${item.description} ${item.terminal}`.toLowerCase();
                return haystack.includes(searchVal);
            });
        }
        currentFiltered = filtered;
        renderGroups(currentFiltered);
    }
    
    function resetFilters() {
        document.getElementById('searchInput').value = '';
        filterData();
    }

    let pieChart = null;
    function drawPieChart() {
        const groups = getFullGroupsForPie();
        const labels = groups.map(g => g.level1);
        const counts = groups.map(g => g.count);
        const ctx = document.getElementById('levelPieChart').getContext('2d');
        if (pieChart) pieChart.destroy();
        const backgroundColors = [
            '#1f77b4', '#ff7f0e', '#2ca02c', '#d62728', '#9467bd', '#8c564b', '#e377c2', '#7f7f7f', '#bcbd22', '#17becf'
        ];
        pieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: counts,
                    backgroundColor: backgroundColors.slice(0, labels.length),
                    borderWidth: 0,
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: { boxWidth: 12, font: { size: 10 } }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const label = context.label || '';
                                const value = context.raw;
                                const total = context.dataset.data.reduce((a,b) => a+b, 0);
                                const percent = ((value / total) * 100).toFixed(1);
                                return `${label}: ${value}项 (${percent}%)`;
                            }
                        }
                    }
                },
                layout: { padding: 6 }
            }
        });
    }

    document.getElementById('searchInput').addEventListener('input', filterData);
    document.getElementById('clearFiltersBtn').addEventListener('click', resetFilters);
    
    filterData();
    drawPieChart();
</script>
</body>
</html>
